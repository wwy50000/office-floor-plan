<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平面布置图</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #fbfcfd;
    }

    body {
      display: grid;
      place-items: center;
      overflow: auto;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      min-width: 760px;
    }
  </style>
</head>
<body>
  <img src="floor-plan.svg" alt="长29.90米、宽14.82米的九房间平面布置图，每个房间均标注长宽尺寸">
</body>
</html>
