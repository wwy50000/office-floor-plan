<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --background: #f2f0eb;
      --foreground: #24221f;
      --card: #f6f1e8;
      --border: #998b76;
      --muted: #d7d4cf;
      --muted-foreground: #67625b;
      --viz-series-1: #5e7467;
      --viz-series-2: #b69763;
      --viz-series-3: #657078;
      --viz-series-4: #9b6b5e;
      --viz-series-5: #6d4935;
      --viz-series-6: #6a6763;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    html body #floor-plan-3d-20260721 .fp3d-stage {
      height: 100%;
      min-height: 0;
      aspect-ratio: auto;
    }

    [hidden] {
      display: none !important;
    }

    .app-bar {
      position: relative;
      z-index: 10;
      min-height: 58px;
      padding: 0 0.85rem;
      border-bottom: 1px solid color-mix(in srgb, var(--border), transparent 55%);
      background: color-mix(in srgb, var(--background), white 10%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex: 0 0 auto;
    }

    .app-brand {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 0.65rem;
    }

    .app-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .app-dimensions {
      color: var(--muted-foreground);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .view-switch {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--border), transparent 42%);
      border-radius: 7px;
      background: color-mix(in srgb, var(--muted), transparent 45%);
    }

    .view-tab {
      min-height: 36px;
      padding: 0 0.85rem;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--muted-foreground);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .view-tab[aria-selected="true"],
    .view-tab[aria-current="page"] {
      background: var(--foreground);
      color: var(--background);
    }

    .plan-workspace {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .view-panel {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .plan-2d-stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #fbfcfd;
    }

    .plan-2d-stage img {
      display: block;
      width: 100%;
      min-width: 760px;
      height: auto;
      margin: auto;
    }

    .plan-2d-download {
      position: sticky;
      z-index: 3;
      top: 0.75rem;
      left: calc(100% - 3rem);
      margin-bottom: -2.25rem;
    }

    .viz-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn {
      min-height: 36px;
      padding: 0 0.8rem;
      border: 1px solid color-mix(in srgb, var(--border), transparent 38%);
      border-radius: 6px;
      background: color-mix(in srgb, var(--background), transparent 10%);
      color: var(--foreground);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font: inherit;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .btn-primary {
      border-color: var(--foreground);
      background: var(--foreground);
      color: var(--background);
    }

    .btn-ghost {
      width: 36px;
      padding: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .app-bar {
        min-height: 54px;
        padding: 0 0.5rem;
        gap: 0.5rem;
      }

      .app-dimensions {
        display: none;
      }

      .view-tab {
        padding: 0 0.6rem;
      }
    }

    @media (max-width: 420px) {
      .app-title {
        display: none;
      }

      .view-switch {
        width: 100%;
      }

      .view-tab {
        flex: 1 1 0;
      }
    }
  </style>
</head>

<main class="plan-workspace">
<section class="view-panel" id="view-3d" role="tabpanel" aria-labelledby="tab-3d" data-panel="3d">
<div id="floor-plan-3d-20260721">
  <div class="fp3d-stage" role="img" aria-label="29.90米乘14.82米平面布置三维立体图">
    <div class="fp3d-controls viz-row" aria-label="视角控制">
      <button type="button" class="btn btn-primary fp3d-view-iso" aria-pressed="true">3D</button>

        <i data-lucide="rotate-ccw" aria-hidden="true"></i>

      <button type="button" class="btn btn-ghost fp3d-download" aria-label="下载三维立体图" data-tooltip="下载图片">

    <div class="fp3d-dimensions text-small">29.90 m × 14.82 m</div>
  </div>
  <p class="sr-only">9个房间按平面图从左到右、从上到下编号，并标注每个房间的长宽尺寸；7号房间左右各布置两张办公桌，中间保留通道。</p>
</div>
</section>
<section class="view-panel" id="view-2d" role="tabpanel" aria-labelledby="tab-2d" data-panel="2d" hidden>
  <div class="plan-2d-stage">
    <a class="btn btn-ghost plan-2d-download" href="floor-plan.svg" download="office-floor-plan.svg" aria-label="下载二维平面图" data-tooltip="下载二维平面图">
      <i data-lucide="download" aria-hidden="true"></i>
    </a>
    <img src="floor-plan.svg" alt="长29.90米、宽14.82米的九房间平面布置图，每个房间均标注长宽尺寸">
  </div>
</section>
</main>

<script>
  (() => {
    const tabs = Array.from(document.querySelectorAll("[data-view]"));
    const panels = Array.from(document.querySelectorAll("[data-panel]"));

    function setView(view, updateHash = true) {
      if (view === "render") {
        window.location.replace("render.html");
        return;
      }
      const selectedView = ["2d", "3d"].includes(view) ? view : "3d";
      tabs.forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.view === selectedView));
      });
      panels.forEach((panel) => {
        panel.hidden = panel.dataset.panel !== selectedView;
      });
      const titleMap = {
        "2d": "办公室平面图 | 2D",
        "3d": "办公室平面图 | 3D"
      };
      document.title = titleMap[selectedView];
      if (updateHash) {
        history.replaceState(null, "", `#${selectedView}`);
      }
      window.dispatchEvent(new CustomEvent("floor-plan:viewchange", {
        detail: { view: selectedView }
      }));
      requestAnimationFrame(() => window.dispatchEvent(new Event("resize")));
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setView(tab.dataset.view));
    });
    window.addEventListener("hashchange", () => setView(location.hash.slice(1), false));
    setView(location.hash.slice(1), false);

    if (window.lucide) {
      window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
    }
  })();
</script>

<script type="module">
  import * as THREE from "https://esm.sh/three@0.180.0";
  import { OrbitControls } from "https://esm.sh/three@0.180.0/examples/jsm/controls/OrbitControls.js";

  const root = document.getElementById("floor-plan-3d-20260721");
  const stage = root.querySelector(".fp3d-stage");
  const isoButton = root.querySelector(".fp3d-view-iso");
  const topButton = root.querySelector(".fp3d-view-top");
  const resetButton = root.querySelector(".fp3d-reset");
  const downloadButton = root.querySelector(".fp3d-download");
  if (window.lucide) {
    window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
  }

  function resolvedColor(variable, fallback) {
    const swatch = document.createElement("span");
    swatch.style.color = `var(${variable}, ${fallback})`;
    swatch.style.display = "none";
    root.appendChild(swatch);
    const color = getComputedStyle(swatch).color || fallback;
    swatch.remove();
    return color;
  }

  const colors = {
    background: resolvedColor("--background", "#f4f5f3"),
    foreground: resolvedColor("--foreground", "#202522"),
    wall: resolvedColor("--card", "#f7f4ed"),
    wallEdge: resolvedColor("--border", "#8f9691"),
    muted: resolvedColor("--muted", "#dce1dd"),
    mutedForeground: resolvedColor("--muted-foreground", "#67625b"),
    series1: resolvedColor("--viz-series-1", "#4f8a78"),
    series2: resolvedColor("--viz-series-2", "#d49b4d"),
    series3: resolvedColor("--viz-series-3", "#6c83a5"),
    series4: resolvedColor("--viz-series-4", "#b87975"),
    series5: resolvedColor("--viz-series-5", "#8b6b4a"),
    series6: resolvedColor("--viz-series-6", "#7a728e")
  };

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(colors.background);
  scene.fog = new THREE.Fog(colors.background, 48, 88);

  const renderer = new THREE.WebGLRenderer({
    antialias: false,
    alpha: false,
    preserveDrawingBuffer: false,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(1);
  renderer.shadowMap.enabled = false;
  renderer.shadowMap.type = THREE.PCFShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.02;
  stage.prepend(renderer.domElement);

  const camera = new THREE.OrthographicCamera(-20, 20, 13, -13, 0.1, 140);
  const target = new THREE.Vector3(14.95, 0.4, 7.41);
  const isoPosition = new THREE.Vector3(43, 30, 35);
  const topPosition = new THREE.Vector3(14.95, 48, 7.42);
  camera.position.copy(isoPosition);
  camera.lookAt(target);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.copy(target);
  controls.enableDamping = false;
  controls.dampingFactor = 0;
  controls.enablePan = false;
  controls.minPolarAngle = 0.05;
  controls.maxPolarAngle = Math.PI * 0.47;
  controls.minZoom = 0.55;
  controls.maxZoom = 3.6;
  controls.update();

  const hemi = new THREE.HemisphereLight("#ffffff", "#767b76", 2.1);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight("#fff4df", 4.2);
  sun.position.set(-18, 35, 20);
  sun.castShadow = false;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -35;
  sun.shadow.camera.right = 35;
  sun.shadow.camera.top = 25;
  sun.shadow.camera.bottom = -25;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 80;
  sun.shadow.bias = -0.0002;
  scene.add(sun);

  const fill = new THREE.DirectionalLight("#dcecff", 1.35);
  fill.position.set(34, 18, -18);
  scene.add(fill);

  const W = 29.9;
  const H = 14.82;
  const TOP_H = 6.22;
  const AISLE_Z = 7.82;
  const FINANCE_X = 9.0;
  const MEETING_X = 20.9;
  const WALL_H = 1.72;
  const WALL_T = 0.18;
  const FLOOR_T = 0.08;
  const DOOR_H = 1.48;

  const model = new THREE.Group();
  scene.add(model);

  function standardMaterial(color, roughness = 0.82, metalness = 0) {
    return new THREE.MeshStandardMaterial({ color, roughness, metalness });
  }

  function softened(color, amount = 0.18) {
    return new THREE.Color(colors.background).lerp(new THREE.Color(color), amount);
  }

  const wallMaterial = standardMaterial(softened(colors.series2, 0.08), 0.72);
  const wallEdgeMaterial = new THREE.LineBasicMaterial({ color: colors.wallEdge, transparent: true, opacity: 0.68 });
  const baseMaterial = standardMaterial(softened(colors.foreground, 0.16), 0.9);
  const neutralFloorMaterial = standardMaterial(softened(colors.wall, 0.72), 0.62);
  const corridorMaterial = standardMaterial(softened(colors.series3, 0.12), 0.72);
  const roomMaterials = [
    colors.series1,
    colors.series2,
    colors.series3,
    colors.series4,
    colors.series6,
    colors.series2,
    colors.series4,
    colors.series5,
    colors.series1
  ].map((color) => standardMaterial(softened(color, 0.11), 0.78));
  const doorMaterial = standardMaterial(softened(colors.series5, 0.88), 0.42, 0.05);
  const glassMaterial = new THREE.MeshStandardMaterial({
    color: softened(colors.series5, 0.28),
    roughness: 0.18,
    metalness: 0,
    transparent: true,
    opacity: 0.32,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const glassDoorMaterial = glassMaterial.clone();
  glassDoorMaterial.opacity = 0.42;
  const glassFrameMaterial = standardMaterial(softened(colors.series2, 0.78), 0.26, 0.58);
  const columnMaterial = standardMaterial(softened(colors.series2, 0.2), 0.58, 0.08);
  const deskMaterial = standardMaterial(softened(colors.series5, 0.82), 0.42, 0.06);
  const stoneTopMaterial = standardMaterial(softened(colors.wall, 0.9), 0.24, 0.02);
  const deskFrameMaterial = standardMaterial(softened(colors.series2, 0.8), 0.28, 0.62);
  const chairMaterial = standardMaterial(softened(colors.series1, 0.5), 0.72);
  const chairFrameMaterial = standardMaterial(softened(colors.foreground, 0.72), 0.34, 0.32);
  const deviceMaterial = standardMaterial(softened(colors.foreground, 0.84), 0.3, 0.12);
  const cabinetMaterial = standardMaterial(softened(colors.series5, 0.58), 0.56, 0.04);
  const rugMaterial = standardMaterial(softened(colors.series6, 0.34), 0.96);
  const featureWallMaterial = standardMaterial(softened(colors.series2, 0.18), 0.52, 0.02);
  const featurePanelMaterial = standardMaterial(softened(colors.series5, 0.68), 0.44, 0.04);

  function addBox(width, height, depth, x, y, z, material, castShadow = true, receiveShadow = true) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
    mesh.position.set(x, y, z);
    mesh.castShadow = castShadow;
    mesh.receiveShadow = receiveShadow;
    model.add(mesh);
    return mesh;
  }

  function addFloor(x0, z0, x1, z1, material) {
    return addBox(x1 - x0 - 0.05, FLOOR_T, z1 - z0 - 0.05, (x0 + x1) / 2, 0.01, (z0 + z1) / 2, material, false, true);
  }

  function addWall(x0, z0, x1, z1, height = WALL_H, material = wallMaterial, thickness = WALL_T) {
    const dx = x1 - x0;
    const dz = z1 - z0;
    const length = Math.hypot(dx, dz);
    if (length < 0.02) return null;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(length, height, thickness), material);
    mesh.position.set((x0 + x1) / 2, height / 2 + 0.08, (z0 + z1) / 2);
    mesh.rotation.y = -Math.atan2(dz, dx);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry, 28), wallEdgeMaterial);
    mesh.add(edges);
    model.add(mesh);
    return mesh;
  }

  function addGlassWall(x0, z0, x1, z1, height = WALL_H) {
    const dx = x1 - x0;
    const dz = z1 - z0;
    const length = Math.hypot(dx, dz);
    if (length < 0.02) return null;
    const group = new THREE.Group();
    group.position.set((x0 + x1) / 2, 0.08, (z0 + z1) / 2);
    group.rotation.y = -Math.atan2(dz, dx);

    const pane = new THREE.Mesh(new THREE.BoxGeometry(length, height - 0.18, 0.07), glassMaterial);
    pane.position.y = height / 2;
    pane.castShadow = false;
    pane.receiveShadow = true;
    pane.renderOrder = 2;
    group.add(pane);

    const bottomRail = new THREE.Mesh(new THREE.BoxGeometry(length + 0.05, 0.1, 0.11), glassFrameMaterial);
    bottomRail.position.y = 0.05;
    bottomRail.castShadow = true;
    group.add(bottomRail);

    const topRail = bottomRail.clone();
    topRail.position.y = height - 0.05;
    group.add(topRail);

    const panelCount = Math.max(1, Math.ceil(length / 2.4));
    for (let i = 0; i <= panelCount; i += 1) {
      const mullion = new THREE.Mesh(new THREE.BoxGeometry(0.065, height, 0.11), glassFrameMaterial);
      mullion.position.set(-length / 2 + length * i / panelCount, height / 2, 0);
      mullion.castShadow = true;
      group.add(mullion);
    }

    model.add(group);
    return group;
  }

  function addDoorX(hingeX, z, width, spanSign, angleSign, material = doorMaterial) {
    const pivot = new THREE.Group();
    pivot.position.set(hingeX, 0.08, z);
    pivot.rotation.y = angleSign * THREE.MathUtils.degToRad(57);
    const leaf = new THREE.Mesh(new THREE.BoxGeometry(width, DOOR_H, 0.055), material);
    leaf.position.set(spanSign * width / 2, DOOR_H / 2, 0);
    leaf.castShadow = material !== glassDoorMaterial;
    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(leaf.geometry), wallEdgeMaterial);
    leaf.add(edge);
    pivot.add(leaf);
    model.add(pivot);
    return pivot;
  }

  function addDoorZ(x, hingeZ, width, spanSign, angleSign) {
    const pivot = new THREE.Group();
    pivot.position.set(x, 0.08, hingeZ);
    pivot.rotation.y = angleSign * THREE.MathUtils.degToRad(57);
    const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.055, DOOR_H, width), doorMaterial);
    leaf.position.set(0, DOOR_H / 2, spanSign * width / 2);
    leaf.castShadow = true;
    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(leaf.geometry), wallEdgeMaterial);
    leaf.add(edge);
    pivot.add(leaf);
    model.add(pivot);
    return pivot;
  }

  function furnitureMesh(group, geometry, material, x, y, z, castShadow = true) {
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, y, z);
    mesh.castShadow = castShadow;
    mesh.receiveShadow = true;
    group.add(mesh);
    return mesh;
  }

  function localOffset(localX, localZ, rotation) {
    return {
      x: localX * Math.cos(rotation) + localZ * Math.sin(rotation),
      z: -localX * Math.sin(rotation) + localZ * Math.cos(rotation)
    };
  }

  function addOfficeChair(x, z, rotation = 0) {
    const group = new THREE.Group();
    group.position.set(x, 0.08, z);
    group.rotation.y = rotation;
    furnitureMesh(group, new THREE.CylinderGeometry(0.25, 0.29, 0.055, 8), chairFrameMaterial, 0, 0.055, 0);
    furnitureMesh(group, new THREE.CylinderGeometry(0.035, 0.05, 0.42, 10), chairFrameMaterial, 0, 0.28, 0);
    furnitureMesh(group, new THREE.BoxGeometry(0.48, 0.09, 0.46), chairMaterial, 0, 0.52, 0);
    const back = furnitureMesh(group, new THREE.BoxGeometry(0.48, 0.46, 0.07), chairMaterial, 0, 0.77, 0.21);
    back.rotation.x = -0.08;
    [-0.21, 0.21].forEach((armX) => {
      furnitureMesh(group, new THREE.BoxGeometry(0.035, 0.22, 0.035), chairFrameMaterial, armX, 0.64, 0);
      furnitureMesh(group, new THREE.BoxGeometry(0.21, 0.035, 0.04), chairFrameMaterial, armX, 0.74, -0.05);
    });
    model.add(group);
    return group;
  }

  function addDesk(x, z, rotation = 0, width = 1.5, depth = 0.72, monitor = true) {
    const group = new THREE.Group();

  function makeLabelTexture(text) {
    const canvas = document.createElement("canvas");
    canvas.width = 512;
    canvas.height = 196;
    const context = canvas.getContext("2d");
    context.clearRect(0, 0, canvas.width, canvas.height);
    context.fillStyle = "rgba(255,255,255,0.9)";
    context.strokeStyle = "rgba(78,84,80,0.28)";
    context.lineWidth = 3;
    context.beginPath();
    context.roundRect(12, 12, 488, 172, 22);
    context.fill();
    context.stroke();
    context.fillStyle = colors.foreground;
    context.textAlign = "center";
    context.textBaseline = "middle";
    const [name, dimensions] = text.split("\n");
    context.font = '500 44px "PingFang SC", "Microsoft YaHei", sans-serif';
    context.fillText(name, 256, dimensions ? 69 : 98);
    if (dimensions) {
      context.fillStyle = colors.mutedForeground;
      context.font = '400 31px "PingFang SC", "Microsoft YaHei", sans-serif';
      context.fillText(dimensions, 256, 132);
    }
    const texture = new THREE.CanvasTexture(canvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.minFilter = THREE.LinearFilter;
    return texture;
  }

  }

  function updateSize() {
    const width = Math.max(stage.clientWidth, 320);
    const height = Math.max(stage.clientHeight, 380);
    renderer.setSize(width, height, false);
    const aspect = width / height;
    const viewWidth = 38.5;
    const viewHeight = Math.max(23.5, viewWidth / aspect);
    camera.left = -viewWidth / 2;
    camera.right = viewWidth / 2;
    camera.top = viewHeight / 2;
    camera.bottom = -viewHeight / 2;
    camera.updateProjectionMatrix();
    requestRender(260);
  }

  function setPressed(mode) {
    const isoActive = mode === "iso";
    isoButton.setAttribute("aria-pressed", String(isoActive));
    topButton.setAttribute("aria-pressed", String(!isoActive));
    isoButton.classList.toggle("btn-primary", isoActive);
    topButton.classList.toggle("btn-primary", !isoActive);
  }

  function moveCamera(destination, mode) {
    if (cameraAnimationFrame) {
      cancelAnimationFrame(cameraAnimationFrame);
      cameraAnimationFrame = 0;
    }
    const startPosition = camera.position.clone();
    const startTarget = controls.target.clone();
    const startedAt = performance.now();
    const duration = 480;
    setPressed(mode);
    function step(now) {
      if (!isPanelVisible()) {
        cameraAnimationFrame = 0;
        return;
      }
      const t = Math.min((now - startedAt) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      camera.position.lerpVectors(startPosition, destination, eased);
      controls.target.lerpVectors(startTarget, target, eased);
      camera.lookAt(controls.target);
      renderScene();
      if (t < 1) {
        cameraAnimationFrame = requestAnimationFrame(step);
      } else {
        cameraAnimationFrame = 0;
        requestRender(160);
      }
    }
    cameraAnimationFrame = requestAnimationFrame(step);
  }

  isoButton.addEventListener("click", () => moveCamera(isoPosition, "iso"));
  topButton.addEventListener("click", () => moveCamera(topPosition, "top"));
  resetButton.addEventListener("click", () => {
    camera.zoom = 1;
    camera.updateProjectionMatrix();
    moveCamera(isoPosition, "iso");
  });

  downloadButton.addEventListener("click", () => {
    renderScene();
    const link = document.createElement("a");
    link.href = renderer.domElement.toDataURL("image/png");
    link.download = "floor-plan-3d.png";
    link.click();
  });

  const resizeObserver = new ResizeObserver(updateSize);
  resizeObserver.observe(stage);
  updateSize();

  function isPanelVisible() {
    return !document.hidden && !root.closest("[data-panel]")?.hidden;
  }

  function renderScene() {
    controls.update();
    renderer.render(scene, camera);
    if (firstFrame) {
      firstFrame = false;
      window.__floorPlan3DReady = true;
      window.__floorPlan3D = { renderer, scene, camera, controls, requestRender };
    }
  }

  function animate(now) {
    animationFrame = 0;
    if (!isPanelVisible()) return;
    renderScene();
    if (now < renderUntil) {
      animationFrame = requestAnimationFrame(animate);
    }
  }

  function requestRender(duration = 140) {
    renderUntil = Math.max(renderUntil, performance.now() + duration);
    if (!animationFrame && isPanelVisible()) {
      animationFrame = requestAnimationFrame(animate);
    }
  }

  controls.addEventListener("change", () => requestRender(120));
  controls.addEventListener("start", () => requestRender(420));
  controls.addEventListener("end", () => requestRender(220));
  window.addEventListener("floor-plan:viewchange", (event) => {
    if (event.detail?.view === "3d") {
      updateSize();
      requestRender(600);
    } else {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = 0;
      }
      if (cameraAnimationFrame) {
        cancelAnimationFrame(cameraAnimationFrame);
        cameraAnimationFrame = 0;
      }
    }
  });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = 0;
      }
      if (cameraAnimationFrame) {
        cancelAnimationFrame(cameraAnimationFrame);
        cameraAnimationFrame = 0;
      }
    } else if (isPanelVisible()) {
      requestRender(260);
    }
  });
  requestRender(420);
</script>
</body>
</html>
